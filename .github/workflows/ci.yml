name: CI

on:
  push:
    branches: [main, integration]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/integration' }}

# Jobs build and run pull-request-supplied code (lakefiles,
# elaboration); restrict the token to read so untrusted PR content
# cannot use a write-capable GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  floodgate_imports:
    name: Floodgate imports lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      # lint-imports.sh enforces the bare-umbrella-import ban (Rule 1)
      # among other subtree rules; a separate grep job would duplicate
      # it.
      - name: scripts/lint-imports.sh
        run: bash scripts/lint-imports.sh
      - name: scripts/tests/test-lint-imports.sh
        run: bash scripts/tests/test-lint-imports.sh
      - name: scripts/tests/test-extract-pr.sh
        run: bash scripts/tests/test-extract-pr.sh
      - name: scripts/tests/test-check-commit-msg.sh
        run: bash scripts/tests/test-check-commit-msg.sh

  commit_message_lint:
    name: Commit message convention
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0
      - name: Validate the pull request's commit subjects
        run: |
          git log --no-merges --format='%s' "${BASE}..${HEAD}" \
            | bash scripts/check-commit-msg.sh
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}

  build:
    name: Build / test / lint / shake
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9  # v1
        with:
          build: true
          test: true
          lint: true
          # Everything builds via the `Geb.*`/`GebTests.*` globs
          # rather than a root import list, and bulk imports are
          # arranged per subdirectory; there is no flat root
          # aggregator for mk_all to check.
          mk_all-check: false
      # `lake shake` requires built oleans for every library it
      # scans. `build: true` above honours `defaultTargets` (Geb
      # only), so build `GebTests` explicitly here.
      - name: lake build GebTests (prerequisite for lake shake)
        run: lake build GebTests
      - name: lake lint GebTests (axiom + style linters on tests)
        run: lake lint -- GebTests
      - name: scripts/tests/test-axiom-linter.sh
        run: bash scripts/tests/test-axiom-linter.sh
      - name: scripts/tests/test-lint-driver.sh
        run: bash scripts/tests/test-lint-driver.sh
      - name: lake shake (minimised imports)
        run: lake shake --add-public --keep-implied --keep-prefix Geb GebTests
      - name: scripts/tests/test-lake-shake.sh
        run: bash scripts/tests/test-lake-shake.sh

  hooks_test:
    name: Hooks smoke test
    runs-on: ubuntu-latest
    # jq is preinstalled on ubuntu-latest runners; no explicit install.
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: scripts/hooks/tests/test-block-mutating-git.sh
        run: bash scripts/hooks/tests/test-block-mutating-git.sh

  regenerate_guard_test:
    name: Integration regeneration guard test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Install pinned jj
        run: bash scripts/install-jj.sh
      - name: scripts/tests/test-regenerate-integration.sh
        run: bash scripts/tests/test-regenerate-integration.sh
      - name: scripts/tests/test-diff-against-main.sh
        run: bash scripts/tests/test-diff-against-main.sh

  bump_detect_tests:
    name: Bump detect-script tests
    runs-on: ubuntu-latest
    # jq is preinstalled on ubuntu-latest runners; no explicit install.
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: scripts/tests/test-mathlib-bump-detect.sh
        run: bash scripts/tests/test-mathlib-bump-detect.sh
      - name: scripts/tests/test-jj-bump-detect.sh
        run: bash scripts/tests/test-jj-bump-detect.sh
