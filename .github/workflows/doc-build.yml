name: Doc build

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  doc-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9  # v1
        with:
          build: true
          test: false
          lint: false
      - run: lake build Geb:docs
