name: Doc build

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  doc-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9  # v1
        with:
          build: true
          test: false
          lint: false
      - run: lake build Geb:docs
