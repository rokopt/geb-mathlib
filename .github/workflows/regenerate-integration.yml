name: Regenerate integration

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: regenerate-integration
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # jj reads the committer identity from these environment
      # variables. `jj config set` is avoided: it parses its value
      # as TOML, and the bracketed bot name is not valid TOML.
      JJ_USER: "github-actions[bot]"
      JJ_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Install pinned jj
        run: bash scripts/install-jj.sh

      - name: Initialize colocated jj repo
        # Topic-branch tracking happens inside the regeneration
        # script (jj bookmark track after fetch), so no per-developer
        # auto-track config is needed here.
        run: jj git init --colocate

      - name: Regenerate and publish integration
        run: bash scripts/regenerate-integration.sh

      - name: Trigger CI on the integration branch
        run: gh workflow run ci.yml --ref integration
        env:
          GH_TOKEN: ${{ github.token }}
