name: Mathlib bump

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

concurrency:
  group: mathlib-bump
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
      issues: read
    outputs:
      target: ${{ steps.detect.outputs.target }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: scripts/mathlib-bump-detect.sh
        id: detect
        run: bash scripts/mathlib-bump-detect.sh
        env:
          GH_TOKEN: ${{ github.token }}

  apply:
    needs: detect
    if: ${{ needs.detect.outputs.target != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set mathlib, cslib, doc-gen4 revs to the target tag
        run: |
          sed -i -E 's/^rev = "[^"]*"/rev = "'"${TARGET}"'"/' lakefile.toml
          echo "lakefile.toml require revisions set to ${TARGET}:"
          grep -nE '^rev = ' lakefile.toml
        env:
          TARGET: ${{ needs.detect.outputs.target }}
      - name: lean-update (lake update, build, PR or issue)
        uses: leanprover-community/lean-update@7fa236acd99c3693bc3ecb902cc655b98e77c03a  # v0.11.0
        with:
          on_update_succeeds: pr
          on_update_fails: issue
          update_if_modified: lake-manifest.json
      - name: Trigger CI on the bump pull request
        run: |
          if [ "$(gh pr list --head auto-update-lean/patch \
                  --state open --json number --jq 'length')" != "0" ]; then
            gh workflow run ci.yml --ref auto-update-lean/patch
          fi
        env:
          GH_TOKEN: ${{ github.token }}
