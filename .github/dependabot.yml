# Keeps the third-party GitHub Actions pinned in
# `.github/workflows/*.yml` current. Opens a reviewable pull
# request — bumping both the commit SHA and its `# vX.Y.Z`
# comment — when a pinned action publishes a new release.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      # Conform to the repository commit-message convention
      # (`ci: <subject>`).
      prefix: "ci"
